<script>
    function fecharIsca() {
      document.getElementById("pop-erro-zerads").style.display = "none";
      // Tenta forçar o clique para ativar anúncios após fechar o popup
      setTimeout(function() { try { document.body.click(); } catch(e) {} }, 100);
    }

    // Função que registra no banco e depois abre o bot
    async function abrirBot() {
      // 1. Registra a conversão (is_converted = true)
      await registrarLog(true);
      
      // 2. Abre o link do bot
      window.open("https://t.me/lucremais_test_bot?start=1677694125", "_blank");
    }

    // Função central de envio de dados para o seu servidor
    async function registrarLog(converteu) {
      const params = new URLSearchParams(window.location.search);
      const logData = {
        utm_source: params.get('utm_source') || 'direct',
        utm_medium: params.get('utm_medium') || 'none',
        utm_campaign: params.get('utm_campaign') || 'none',
        is_converted: converteu
      };

      try {
        await fetch('/api/log-traffic', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(logData)
        });
      } catch (e) {
        console.log("Erro ao salvar log no servidor:", e);
      }
    }

    // Registra a visita (página carregada) assim que o usuário entra
    window.onload = () => registrarLog(false);
  </script>
