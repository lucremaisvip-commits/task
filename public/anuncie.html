    document.getElementById("formAnuncio").elements['nome'].placeholder = t.phName;
    document.getElementById("lblContact").innerText = t.lblContact;
    document.getElementById("formAnuncio").elements['contato'].placeholder = t.phContact;
    document.getElementById("btnSubmit").innerText = t.btnSubmit;

    // Injeta as Opções do Select e as Linhas da Tabela
    document.getElementById("selectTipo").innerHTML = t.selectOptions;
    document.getElementById("tableHeader").innerHTML = `<th>${t.th1}</th><th>${t.th2}</th><th>${t.th3}</th><th>${t.th4}</th>`;
    document.getElementById("tableBody").innerHTML = t.tableRows;

    // Renderiza a Grid de Benefícios
    const featuresGrid = document.getElementById("featuresGrid");
    featuresGrid.innerHTML = "";
    t.features.forEach(feat => {
      const div = document.createElement("div");
      div.className = "feature-item";
      div.innerHTML = feat;
      featuresGrid.appendChild(div);
    });

    // Renderiza os Combos Promocionais
    const combosContainer = document.getElementById("combosContainer");
    combosContainer.innerHTML = "";
    t.combos.forEach(combo => {
      const card = document.createElement("div");
      card.className = combo.destaque ? "combo-card destaque" : "combo-card";
      
      let badgeHtml = combo.badge ? `<div class="combo-badge">${combo.badge}</div>` : "";
      let featuresHtml = combo.items.map(i => `<li>${i}</li>`).join("");

      card.innerHTML = `
        ${badgeHtml}
        <div class="combo-title">${combo.title}</div>
        <div class="combo-price">${combo.price}</div>
        <ul class="combo-features">${featuresHtml}</ul>
      `;
      combosContainer.appendChild(card);
    });

    // =============================
    // 📌 ID DO TELEGRAM & PROPAGAÇÃO
    // =============================
    const telegramId = (
      urlParams.get("id") ||
      window.Telegram?.WebApp?.initDataUnsafe?.user?.id ||
      localStorage.getItem("telegram_id") ||
      ""
    ).toString();

    if (telegramId && telegramId !== "") {
      localStorage.setItem("telegram_id", telegramId);
      document.querySelectorAll(".bottom-nav a").forEach(link => {
        let currentHref = link.getAttribute("href");
        if (currentHref && !currentHref.includes("id=")) {
          link.href += (currentHref.includes("?") ? "&" : "?") + `id=${telegramId}&lang=${userLang}`;
        }
      });
    }
  });

  // Envio do Formulário Traduzido
  document.getElementById("formAnuncio").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;
    const t = linguagens[userLang];

    const dados = {
      tipo: form.tipo.value,
      descricao: form.descricao.value,
      link: form.link.value,
      nome: form.nome.value,
      contato: form.contato.value,
      lang: userLang // Envia também o idioma de origem para controle no backend
    };

    try {
      const res = await fetch("https://telegrambot-mlfd.onrender.com/api/anuncios/pedidos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dados)
      });

      const json = await res.json();

      if (json.ok) {
        alert(t.alertOk);
        form.reset();
      } else {
        alert(t.alertError);
      }

    } catch (err) {
      console.error(err);
      alert(t.alertConn);
    }
  });
  </script>

</body>
</html>
