<script>
  let telegramId = "";
  let userLang = "en";

  const linguagens = {
    en: {
      pageTitle: "Offerwalls - LucreMaisTask",
      wallTitle: "🧩 Choose your External Task",
      autoPayout: "💰 Complete and Earn: Points and XP credited automatically within 5 minutes. The more you interact, the more you level up!",
      sponsorship: "📢 Sponsorship",
      adsTitle: "📣 Want to advertise here?",
      adsDesc: "Promote your product, course, or service directly inside our bot!",
      btnAdvertise: "📢 Advertise Now",
      navHome: "Home",
      navTasks: "Tasks",
      navInvites: "Invites",
      navOfferwalls: "Offerwalls",
      navWithdraw: "Withdraw",
      errorId: "Error: User ID not found.",
      errorIdent: "User ID not identified.",
      alertFeedback: "Redirecting to ZerAds..."
    },
    pt: {
      pageTitle: "Ofertas - LucreMaisTask",
      wallTitle: "🧩 Escolha sua Tarefa Externa",
      autoPayout: "💰 Complete e Ganhe: Pontos e XP creditados automaticamente em até 5 minutos. Quanto mais você interage, mais você evolui!",
      sponsorship: "📢 Patrocínio",
      adsTitle: "📣 Quer anunciar aqui?",
      adsDesc: "Promova seu produto, curso ou serviço dentro do nosso bot!",
      btnAdvertise: "📢 Anunciar Agora",
      navHome: "Início",
      navTasks: "Tarefas",
      navInvites: "Convites",
      navOfferwalls: "Ofertas",
      navWithdraw: "Sacar",
      errorId: "Erro: ID de usuário não encontrado.",
      errorIdent: "ID de usuário não identificado.",
      alertFeedback: "Redirecionando para ZerAds..."
    }
  };

  // Função de segurança para evitar erros de "null"
  function safeSetText(id, text) {
    const el = document.getElementById(id);
    if (el) el.innerText = text;
  }

  document.addEventListener("DOMContentLoaded", () => {
    const urlParams = new URLSearchParams(window.location.search);
    userLang = urlParams.get("lang") === "pt" ? "pt" : "en";
    document.documentElement.lang = userLang;
    const t = linguagens[userLang] || linguagens['en'];

    // Tradução segura
    safeSetText("pageTitle", t.pageTitle);
    safeSetText("mainWallTitle", t.wallTitle);
    safeSetText("autoPayoutNote", t.autoPayout);
    safeSetText("txtSponsorship", t.sponsorship);
    safeSetText("adsBlockTitle", t.adsTitle);
    safeSetText("adsBlockDesc", t.adsDesc);
    safeSetText("btnAdvertiseNow", t.btnAdvertise);

    // Navegação segura
    document.querySelectorAll(".bottom-nav a .txt-nav").forEach(span => {
        const parentId = span.parentElement.id;
        if(parentId === "navHome") span.innerText = t.navHome;
        if(parentId === "navTasks") span.innerText = t.navTasks;
        if(parentId === "navInvites") span.innerText = t.navInvites;
        if(parentId === "navOfferwalls") span.innerText = t.navOfferwalls;
        if(parentId === "navWithdraw") span.innerText = t.navWithdraw;
    });

    telegramId = (urlParams.get("id") || window.Telegram?.WebApp?.initDataUnsafe?.user?.id || localStorage.getItem("telegram_id") || "").toString();

    if (!telegramId) {
      document.body.innerHTML = t.errorId;
    } else {
      localStorage.setItem("telegram_id", telegramId);
      document.querySelectorAll(".bottom-nav a").forEach(link => {
        let baseHref = link.getAttribute("href").split("?")[0];
        link.href = `${baseHref}?id=${telegramId}&lang=${userLang}`;
      });

      const cpaleadFrame = document.getElementById("cpalead-frame");
      const moneyrainFrame = document.getElementById("moneyrain-frame");
      if(cpaleadFrame) cpaleadFrame.src = `https://www.akamaicdn.org/list/XrdSA?subid=telegram_${telegramId}`;





      
      // MUDANÇA: Adicionado "&site=teste-bot" para direcionar ao nosso site de testes configurado no painel MoneyRain
      
      if(moneyrainFrame) moneyrainFrame.src = `https://offerwall.moneyrain.top/embed.php?pub=228&site=teste-bot&uid=${telegramId}`;
    }

  });

  function mostrarWall(wall) {
    const cpaleadFrame = document.getElementById("cpalead-frame");
    const moneyrainFrame = document.getElementById("moneyrain-frame");
    const offersCard = document.getElementById("offersCard");
    
    if (offersCard) offersCard.style.display = "block";
    if (cpaleadFrame) cpaleadFrame.style.display = wall === "cpalead" ? "block" : "none";
    if (moneyrainFrame) moneyrainFrame.style.display = wall === "moneyrain" ? "block" : "none";
  }

  function abrirZerAds() {
    const t = linguagens[userLang];
    if (!telegramId) { alert(t.errorIdent); return; }




    
    // ref=11571 é bot de teste e 11354 bot produção 


    
    window.open(`https://zerads.com/ptc.php?ref=11571&user=${telegramId}`, "_blank");
    alert(t.alertFeedback);
  }
</script>

</body>
